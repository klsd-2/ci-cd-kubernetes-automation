apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app
  namespace: devops-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
      - name: flask-app

        image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/flask-app:latest

        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: flask-config

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
